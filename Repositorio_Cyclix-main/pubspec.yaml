name: cyclix_mapa_detalle
description: "Cyclix — mapa, escaneo QR y detalle de bicicleta"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.10.0
  google_maps_flutter_android: ^2.19.8
  google_maps_flutter_platform_interface: ^2.15.0
  geolocator: ^13.0.2
  mobile_scanner: ^6.0.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  http: ^1.2.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  camera: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_cyclix.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo_cyclix.png
